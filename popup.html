<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h3>Volume Booster</h3>
    </div>
    
    <div class="toggle-control">
      <label class="toggle-switch">
        <input type="checkbox" id="volumeToggle">
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-label">Volume Booster</span>
    </div>
    
    <div class="volume-control">
      <label for="volumeSlider">Volume Level:</label>
      <div class="slider-container">
        <input type="range" id="volumeSlider" min="10" max="1200" value="100" step="25">
        <span id="volumeValue">100%</span>
      </div>
    </div>
    
    <div class="presets">
      <button class="preset-btn" data-volume="200">200%</button>
      <button class="preset-btn" data-volume="400">400%</button>
      <button class="preset-btn" data-volume="600">600%</button>
      <button class="preset-btn" data-volume="800">800%</button>
      <button class="preset-btn" data-volume="1000">1000%</button>
      <button class="preset-btn" data-volume="1200">1200%</button>
    </div>
    
    <div class="warning">
      <small>⚠️ High volumes may damage hearing. Use responsibly.</small>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
